services:
  # Spring Boot Backend Web Service
  - type: web
    name: smart-campus-backend
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/smart-campus-backend-0.0.1-SNAPSHOT.jar
    rootDir: backend
    envVars:
      - key: MONGODB_URI
        sync: false
        description: "MongoDB Atlas connection string (e.g., mongodb+srv://...)"
      - key: GOOGLE_CLIENT_ID
        sync: false
        description: "Google OAuth2 Client ID"
      - key: GOOGLE_CLIENT_SECRET
        sync: false
        description: "Google OAuth2 Client Secret"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: FRONTEND_BASE_URL
        sync: false
        description: "The full URL of your deployed frontend (e.g., https://smart-campus-frontend.onrender.com)"

  # React Frontend Static Site
  - type: static
    name: smart-campus-frontend
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
        description: "The full backend API URL (e.g., https://smart-campus-backend.onrender.com/api)"
      - key: VITE_OAUTH_USER_URL
        sync: false
        description: "Google OAuth user endpoint (e.g., https://smart-campus-backend.onrender.com/api/auth/google/user)"
      - key: VITE_OAUTH_TECH_URL
        sync: false
        description: "Google OAuth technician endpoint (e.g., https://smart-campus-backend.onrender.com/api/auth/google/technician)"
