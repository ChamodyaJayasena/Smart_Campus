services:
  # Unified Web Service (Frontend and Backend served together via Docker)
  - type: web
    name: smart-campus
    runtime: docker
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
        description: "MongoDB Atlas connection string (e.g., mongodb+srv://...)"
      - key: GOOGLE_CLIENT_ID
        sync: false
        description: "Google OAuth2 Client ID"
      - key: GOOGLE_CLIENT_SECRET
        sync: false
        description: "Google OAuth2 Client Secret"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
