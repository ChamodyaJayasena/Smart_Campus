services:
  # Unified Web Service (Frontend and Backend served together)
  - type: web
    name: smart-campus
    env: java
    plan: free
    buildCommand: bash build.sh
    startCommand: java -jar backend/target/smart-campus-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: MONGODB_URI
        sync: false
        description: "MongoDB Atlas connection string (e.g., mongodb+srv://...)"
      - key: GOOGLE_CLIENT_ID
        sync: false
        description: "Google OAuth2 Client ID"
      - key: GOOGLE_CLIENT_SECRET
        sync: false
        description: "Google OAuth2 Client Secret"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: FRONTEND_BASE_URL
        fromEnvVar: RENDER_EXTERNAL_URL
